# Railway config-as-code. Tells Railway to use the repo-root Dockerfile and
# skip Railpack auto-detection (which can't find Dockerfiles in subdirs and
# would otherwise fall through to Ruby/Dotnet/Gleam/etc. providers).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
