# Distilled spirits rule set — covers the brief's bourbon example and the
# matching cross-checks against the producer's submitted record.
#
# Rules with `cross_reference*` checks pull the "expected" value from
# ctx.application.producer_record, which is the application data the agent
# is reviewing the label against.

- id: spirits.brand_name.matches_application
  version: 1
  beverage_types: [spirits]
  citation: 27 CFR 5.32
  description: Brand name must be present and match the producer record
  severity: required
  fix_suggestion: |
    Make sure the brand name on the label exactly matches the application.
    Trivial differences (case, punctuation) will surface for review rather
    than being auto-rejected.
  checks:
    - type: presence
      params:
        field: brand_name
    - type: cross_reference
      params:
        field: brand_name
        record_key: brand_name

- id: spirits.class_type.matches_application
  version: 2
  beverage_types: [spirits]
  # 5.32(a)(2) (modernised) governs the *presence* of a class/type
  # designation on the label. The substantive class-of-spirits standards
  # (whiskey, gin, vodka, rum, tequila, etc.) live at 5.143 — those are
  # enforced by the v2 taxonomy work, not by this presence rule.
  citation: 27 CFR 5.32(a)(2)
  description: Class/type designation must be present and match the producer record
  severity: required
  fix_suggestion: |
    Add the TTB class/type designation (e.g. "Kentucky Straight Bourbon
    Whiskey") matching what was submitted in the application.
  checks:
    - type: presence
      params:
        field: class_type
    - type: cross_reference
      params:
        field: class_type
        record_key: class_type

- id: spirits.alcohol_content.format
  version: 1
  beverage_types: [spirits]
  citation: 27 CFR 5.37
  description: Alcohol content statement must be in valid TTB format
  severity: required
  fix_suggestion: |
    State alcohol content as a percentage with the suffix "Alc./Vol." or
    equivalent (e.g. "45% Alc./Vol."). The proof figure may also appear
    in parentheses (e.g. "(90 Proof)").
  checks:
    - type: regex
      params:
        field: alcohol_content
        pattern: '\d+(\.\d+)?\s*%\s*(Alc\.?\s*\/\s*Vol\.?|ABV|ALCOHOL)'
        flags: i

- id: spirits.alcohol_content.matches_application
  version: 1
  beverage_types: [spirits]
  citation: 27 CFR 5.37
  description: Alcohol content must match the producer record (ABV ↔ proof equivalence)
  severity: required
  fix_suggestion: |
    The first numeric value on the label should match the ABV submitted
    in the application. A proof figure (e.g. "90 Proof") at 2× the ABV
    is also accepted.
  checks:
    - type: cross_reference_numeric
      params:
        field: alcohol_content
        record_key: alcohol_content
        tolerance: 0.005
        allow_proof_equivalence: true

- id: spirits.net_contents.matches_application
  version: 1
  beverage_types: [spirits]
  citation: 27 CFR 5.38
  description: Net contents must be present and match the producer record (unit-aware)
  severity: required
  fix_suggestion: |
    Add a net contents statement (e.g. "750 mL"). Units are normalised
    so "750 mL" and "0.75 L" are treated as equivalent.
  checks:
    - type: presence
      params:
        field: net_contents
    - type: cross_reference_volume
      params:
        field: net_contents
        record_key: net_contents
        tolerance: 0.01

- id: spirits.name_address.presence
  version: 2
  beverage_types: [spirits]
  citation: 27 CFR 5.66
  description: Bottler/producer name and address must be present
  severity: required
  fix_suggestion: |
    Add a producer/bottler statement (e.g. "Bottled by Old Tom Distilling
    Co., Bardstown, Kentucky").
  checks:
    - type: presence
      params:
        field: name_address

- id: spirits.country_of_origin.presence_if_imported
  version: 1
  beverage_types: [spirits]
  citation: 27 CFR 5.36(d)
  description: Imported spirits must declare country of origin
  severity: required
  applies_if: is_imported == True
  fix_suggestion: |
    Add a country-of-origin statement (e.g. "Product of Mexico"). Required
    only for imported spirits.
  checks:
    - type: presence
      params:
        field: country_of_origin

- id: spirits.health_warning.compliance
  version: 1
  beverage_types: [spirits]
  citation: 27 CFR 16.21
  description: Government Health Warning must include the verbatim ALL-CAPS prefix and full statement
  severity: required
  fix_suggestion: |
    The Government Health Warning must read in full:
      "GOVERNMENT WARNING: (1) According to the Surgeon General, women
       should not drink alcoholic beverages during pregnancy because of
       the risk of birth defects. (2) Consumption of alcoholic beverages
       impairs your ability to drive a car or operate machinery, and may
       cause health problems."
    The "GOVERNMENT WARNING:" prefix must appear verbatim in capitals;
    title case (e.g. "Government Warning:") is not acceptable.
  checks:
    - type: warning_compliance
      params:
        field: health_warning
        canonical_ref: health_warning
        max_body_edit_distance: 5

- id: spirits.age_statement.format
  version: 1
  beverage_types: [spirits]
  citation: https://www.ecfr.gov/current/title-27/chapter-I/subchapter-A/part-5/subpart-D/section-5.40
  # The rule's effective severity is decided inside the check itself
  # based on `class_type`: when the label declares "Straight" + a
  # whiskey designator (Bourbon, Rye, Whiskey, etc.), an age statement
  # is REQUIRED for products under four years old (27 CFR 5.40), so
  # missing/wrong format produces FAIL. For other spirits it is
  # ADVISORY — extracted age statements are still format-checked, but a
  # missing one does not fail the report. The rule is declared
  # `required` here so the engine's REQUIRED-rule downgrade machinery
  # remains in play; the check itself emits ADVISORY directly when the
  # class doesn't trigger the requirement.
  severity: required
  description: |
    Age statement format is validated when present, and required for
    straight whiskey classes that need a TTB age declaration under
    27 CFR 5.40.
  fix_suggestion: |
    Format the age statement as "Aged <number> Years" or "Aged <number>
    Months" (e.g. "Aged 4 Years", "AGED 18 MONTHS"). Required for
    straight whiskey under four years old; optional for other spirits.
  checks:
    - type: age_statement
      params:
        field: age_statement
        class_type_field: class_type
        # Recognised number-and-unit format. Case-insensitive.
        pattern: 'aged\s+(?:a\s+minimum\s+of\s+)?\d+\s+(years?|months?)'
        flags: i
