# Fly.io app config. App name must be globally unique — change `app` below
# (or run `flyctl apps create <your-name>` and update this file) before the
# first deploy.

app = "proofread-rk-take"
primary_region = "sjc"

[build]
  # Uses ./Dockerfile

[env]
  VISION_EXTRACTOR = "claude"
  ANTHROPIC_MODEL = "claude-opus-4-7"
  # ANTHROPIC_API_KEY is set via `flyctl secrets set` — never commit it.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
