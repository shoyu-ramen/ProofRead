# Scheduled latency + accuracy probe against the deployed verify endpoint.
#
# Runs `backend/scripts/verify_latency.py` against production once per day
# (and on demand via workflow_dispatch). The script asserts:
#   * cold-call wall-clock under MAX_COLD_MS (default 12 s — Haiku 4.5
#     primary + parallel Haiku second-pass measure ~8 s end-to-end from a
#     US-East GitHub runner; the 12 s budget gives ~50% headroom for
#     normal jitter and still catches a 2× regression like a model swap
#     back to Sonnet/Opus);
#   * warm-call client p95 under 2.5 s — server-side is essentially zero
#     on a cache hit (sub-millisecond LRU lookup), so this budget is
#     dominated by the GitHub-runner-to-Railway-edge network round-trip
#     plus TLS handshake. Measured p95 from US-East runners lands around
#     1.3-1.5 s, leaving ~1 s of jitter headroom before the alarm fires;
#   * 100% warm cache hits (the iterative-design workflow's load-bearing
#     property; <100% means cache-key determinism regressed);
#   * the bundled bourbon sample still verdicts "pass" (catches accuracy
#     regressions from a future model swap or prompt edit).
#
# A failure here is a real regression — page it. Configure repo secret /
# variable `VERIFY_PROBE_BASE_URL` to point at the canonical deploy
# (e.g. https://<service>.up.railway.app). Railway cold-starts add ~1 s
# on the first call after idle; the script accepts that because the probe
# is timed end-to-end with the model call dominating, not the boot.

name: latency-probe

on:
  schedule:
    # 07:00 UTC daily — quiet hour US/PT, lets a fresh deploy soak before
    # we measure it. Cron strings are UTC-only on GitHub-hosted runners.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (overrides VERIFY_PROBE_BASE_URL)"
        required: false
        type: string
      n:
        description: "Total requests (1 cold + n-1 warm)"
        required: false
        default: "10"
        type: string
      max_cold_ms:
        description: "Cold-call latency budget (ms)"
        required: false
        default: "12000"
        type: string

# A late-running probe must not collide with an in-progress deploy from
# `ci.yml`. The probe queues behind the deploy by sharing this group.
concurrency:
  group: deploy-probe
  cancel-in-progress: false

jobs:
  probe:
    name: probe verify endpoint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install probe deps
        # Only install httpx (the probe's only runtime dep). Skipping the
        # full backend install keeps the job under 30 s of setup so a
        # nightly schedule doesn't dominate the Actions minutes budget.
        run: pip install "httpx>=0.27"

      - name: Resolve target URL
        id: target
        env:
          INPUT_URL: ${{ github.event.inputs.base_url }}
          REPO_VAR_URL: ${{ vars.VERIFY_PROBE_BASE_URL }}
        run: |
          set -euo pipefail
          # Manual dispatch input wins; otherwise fall back to the repo
          # variable. If neither is set, fail loudly — silently probing
          # the wrong host hides the actual regression we're trying to
          # catch.
          BASE="${INPUT_URL:-$REPO_VAR_URL}"
          if [ -z "$BASE" ]; then
            echo "::error::Set repo variable VERIFY_PROBE_BASE_URL or pass base_url via workflow_dispatch."
            exit 1
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run probe
        id: probe
        env:
          BASE: ${{ steps.target.outputs.base }}
          N: ${{ github.event.inputs.n || '10' }}
          MAX_COLD_MS: ${{ github.event.inputs.max_cold_ms || '8000' }}
        run: |
          set -euo pipefail
          python scripts/verify_latency.py \
            --base "$BASE" \
            --n "$N" \
            --concurrency 4 \
            --timeout 60 \
            --expect-overall pass \
            --max-cold-ms "$MAX_COLD_MS" \
            --max-warm-p95-ms 2500 \
            --require-warm-cache-hits \
            --json | tee probe-output.txt

      - name: Extract JSON for summary
        if: always()
        # The probe prints a human summary plus a JSON block introduced
        # by `=== JSON ===`. Slice that off so the summary writer below
        # has clean JSON regardless of whether the probe step succeeded
        # or failed.
        run: |
          set -euo pipefail
          if [ ! -f probe-output.txt ]; then
            echo '{"cold":{},"warm":{}}' > probe.json
            exit 0
          fi
          awk '/^=== JSON ===$/{flag=1; next} flag' probe-output.txt > probe.json || true
          if [ ! -s probe.json ]; then
            echo '{"cold":{},"warm":{}}' > probe.json
          fi

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib

          # `defaults.run.working-directory: backend` already puts us in
          # backend/, so probe.json is at the cwd root, not under another
          # backend/ subdir.
          data = json.loads(pathlib.Path("probe.json").read_text() or "{}")
          cold = data.get("cold", {}) or {}
          warm = data.get("warm", {}) or {}

          def fmt_ms(v):
              if v is None:
                  return "n/a"
              return f"{v/1000:.2f} s" if v >= 1000 else f"{v:.0f} ms"

          print("# Latency probe")
          print()
          print("## Cold")
          print()
          print("| metric | value |")
          print("| --- | --- |")
          print(f"| status | {cold.get('status', 'n/a')} |")
          print(f"| client | {fmt_ms(cold.get('client_ms'))} |")
          print(f"| server | {fmt_ms(cold.get('server_ms'))} |")
          print(f"| cache_hit | {cold.get('cache_hit', 'n/a')} |")
          print(f"| overall | `{cold.get('overall', 'n/a')}` |")
          if cold.get("error"):
              print(f"| error | `{cold['error']}` |")
          print()

          cms = warm.get("client_ms") or {}
          sms = warm.get("server_ms") or {}
          print("## Warm")
          print()
          print("| metric | client | server |")
          print("| --- | --- | --- |")
          print(f"| n | {cms.get('n', 0)} | {sms.get('n', 0)} |")
          print(f"| p50 | {fmt_ms(cms.get('p50'))} | {fmt_ms(sms.get('p50'))} |")
          print(f"| p95 | {fmt_ms(cms.get('p95'))} | {fmt_ms(sms.get('p95'))} |")
          print(f"| p99 | {fmt_ms(cms.get('p99'))} | {fmt_ms(sms.get('p99'))} |")
          print(f"| min | {fmt_ms(cms.get('min'))} | {fmt_ms(sms.get('min'))} |")
          print(f"| max | {fmt_ms(cms.get('max'))} | {fmt_ms(sms.get('max'))} |")
          print(f"| mean | {fmt_ms(cms.get('mean'))} | {fmt_ms(sms.get('mean'))} |")
          print()
          rate = warm.get("cache_hit_rate")
          if rate is not None:
              print(f"**Cache hit rate:** {rate:.0%} ({warm.get('cache_hits', 0)}/{warm.get('ok', 0)})")
              print()
          verdicts = warm.get("verdicts") or {}
          if verdicts:
              parts = ", ".join(f"`{k}` × {v}" for k, v in verdicts.items())
              print(f"**Verdicts:** {parts}")
              print()
          errors = warm.get("errors") or []
          if errors:
              print(f"### {len(errors)} warm error(s)")
              print()
              for e in errors:
                  print(f"- status `{e.get('status')}`: `{e.get('error')}`")
          PY

      - name: Upload probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latency-probe-${{ github.run_id }}
          path: |
            backend/probe-output.txt
            backend/probe.json
          retention-days: 30
