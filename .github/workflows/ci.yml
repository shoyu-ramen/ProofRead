# CI. Mirrors the local checks in DEPLOY.md and backend/README.md.
#
# Triggers:
#   - PRs to main: backend + mobile + docker jobs.
#   - Pushes to main: same checks. Railway auto-deploys on push via its
#     own GitHub integration; the `docker` job here gates Railway by
#     catching image breakage before Railway's builder sees it.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from the Actions UI / `gh workflow run ci.yml`.
  workflow_dispatch:

# Cancel superseded PR runs to keep the queue short. Pushes to main run
# to completion so the docker build that gates Railway sees every commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: backend (lint + types + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev extras)
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check app tests validation

      # mypy is currently advisory: 24 pre-existing errors, mostly Anthropic
      # SDK union types in services/vision.py and missing third-party stubs
      # (yaml, boto3, google.cloud). Surfacing them in CI for visibility;
      # flip `continue-on-error` to false once the queue is drained.
      - name: mypy (advisory)
        continue-on-error: true
        run: mypy app

      - name: pytest
        run: pytest -q tests validation

  mobile:
    name: mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npm run typecheck

  docker:
    name: docker build (railway image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Builds the repo-root Dockerfile that Railway uses. Railway's GitHub
      # integration auto-deploys on push to main, so this job catches a
      # broken image before Railway's builder does. Layer cache is
      # persisted across runs via GitHub Actions cache.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: proofread-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
